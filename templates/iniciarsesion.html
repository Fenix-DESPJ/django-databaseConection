{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicia Sesión | M&A Barber Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/iniciarsesion.css' %}">
    <link rel="icon" type="image/jpeg" href="{% static 'img/logo.jpeg' %}">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <img src="{% static 'img/logo.jpeg' %}" alt="Logo M&A Barber Shop" class="logo-login">

            <h1>Iniciar Sesión</h1>

            <p class="subtitulo">
                Accede a tu cuenta para gestionar tus citas.
            </p>

            <form id="form-login">
                <div class="mb-3">
                    <label for="usuario" class="form-label">Usuario o Número de Teléfono</label>
                    <input type="text" class="form-control" id="usuario" placeholder="ejemplo@gmail.com">
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" placeholder="Ingresa tu contraseña">
                </div>

                <button type="submit" class="btn-login">
                    Iniciar
                </button>
            </form>

            <a href="{% url 'index' %}" class="volver">
                ← Volver a inicio
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
