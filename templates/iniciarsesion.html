{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicia Sesión | M&A Barber Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/iniciarsesion.css' %}">
    <link rel="icon" type="image/jpeg" href="{% static 'img/logo.jpeg' %}">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <img src="{% static 'img/logo.jpeg' %}" alt="Logo M&A Barber Shop" class="logo-login">

            <h1>Iniciar Sesión</h1>

            <p class="subtitulo">
                Accede a tu cuenta para gestionar tus citas.
            </p>

            {% if messages %}
                <div class="messages mb-3">
                    {% for message in messages %}
                        <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-success{% endif %} p-2 small text-center fade show js-timeout-alert" role="alert" style="transition: opacity 0.5s ease;">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <form id="form-login" method="POST" action="{% url 'iniciar_sesion' %}">
                {% csrf_token %} 

                <div class="mb-4">
                    <label class="form-label text-center d-block">Selecciona tu rol</label>
                    <div class="role-selector-container">
                        <input type="radio" name="rol" id="rol-admin" value="administrador" checked>
                        <label for="rol-admin" class="role-tab">Administrador</label>

                        <input type="radio" name="rol" id="rol-barbero" value="barbero">
                        <label for="rol-barbero" class="role-tab">Barbero</label>

                        <input type="radio" name="rol" id="rol-cliente" value="cliente">
                        <label for="rol-cliente" class="role-tab">Cliente</label>
                        
                        <div class="role-glider"></div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="usuario" class="form-label">Correo o Número de Teléfono</label>
                    <input type="text" class="form-control" id="usuario" name="identificador" placeholder="ejemplo@gmail.com o cel" required>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" name="contrasena" placeholder="Ingresa tu contraseña" required>
                    <a href="{% url 'olvide_contrasena' %}" class="small text-white-50 text-decoration-none">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login">
                    Iniciar
                </button>
            </form>

            <a href="{% url 'home' %}" class="volver">
                &larr; Volver a inicio
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/script.js' %}"></script>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        // Buscamos las alertas de Django con la clase 'alert'
        const alerts = document.querySelectorAll('.alert');
        
        alerts.forEach(function(alert) {
            setTimeout(function() {
                // Validación segura: si Bootstrap JS está disponible, lo usa
                if (typeof bootstrap !== 'undefined' && bootstrap.Alert) {
                    const bsAlert = bootstrap.Alert.getOrCreateInstance(alert);
                    bsAlert.close();
                } else {
                    // Si no, lo desvanece con CSS puro para no romper nada
                    alert.style.transition = "opacity 0.5s ease";
                    alert.style.opacity = "0";
                    setTimeout(() => alert.remove(), 500);
                }
            }, 3000); 
        });
    });
</script>
</body>
</html>
